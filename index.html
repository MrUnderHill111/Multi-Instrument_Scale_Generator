<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Multi-Instrument Scale Generator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(ellipse at top, #1e3c72 0%, #2a5298 50%, #1a1a2e 100%);
            min-height: 100vh; padding: 20px; color: #333; -webkit-text-size-adjust: 100%;
        }
        .container {
            max-width: 1400px; margin: 0 auto; background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px); border-radius: 24px; padding: 40px;
            box-shadow: 0 32px 64px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.4);
            border: 1px solid rgba(255,255,255,0.2); position: relative;
        }
        h1 {
            text-align: center; margin-bottom: 40px;
            font-size: clamp(0.9rem, 2.5vw, 3.2em); font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .controls { display: flex; justify-content: center; gap: 32px; margin-bottom: 40px; flex-wrap: wrap; }
        .control-group { text-align: center; }
        label { display: block; font-weight: 600; margin-bottom: 12px; color: #555; font-size: 0.95em; text-transform: uppercase; letter-spacing: 0.5px; }
        select {
            padding: 16px 20px; border: 2px solid rgba(102,126,234,0.2); border-radius: 16px;
            font-size: 16px; font-weight: 500; background: rgba(255,255,255,0.9); cursor: pointer;
            transition: all 0.3s ease; min-width: 140px; box-shadow: 0 4px 16px rgba(102,126,234,0.1);
            -webkit-appearance: none; -moz-appearance: none; appearance: none;
        }
        select:hover, select:focus { outline: none; border-color: #667eea; box-shadow: 0 8px 32px rgba(102,126,234,0.2), 0 0 0 4px rgba(102,126,234,0.1); transform: translateY(-2px); }
        .scale-title { text-align: center; font-size: 1.8em; font-weight: 600; margin-bottom: 32px; color: #333; position: relative; }
        .reset-button {
            position: absolute; right: 0; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.7); border: 1px solid rgba(102,126,234,0.2);
            border-radius: 12px; color: #666; font-size: 10px; font-weight: 500;
            padding: 6px 10px; cursor: pointer; transition: all 0.3s ease;
            text-transform: uppercase; letter-spacing: 0.3px;
        }
        .reset-button:hover { background: rgba(255,255,255,0.9); color: #555; transform: translateY(-50%) translateY(-1px); }
        .instruments-grid { display: grid; gap: 24px; margin-top: 20px; }
        .instruments-grid.single  { grid-template-columns: 1fr; }
        .instruments-grid.dual    { grid-template-columns: 1fr 1fr; }
        .instruments-grid.triple  { grid-template-columns: 1fr 1fr 1fr; }
        .instruments-grid.quad    { grid-template-columns: 1fr 1fr; }
        .instruments-grid.five    { grid-template-columns: 1fr 1fr 1fr; }
        .instruments-grid.six     { grid-template-columns: 1fr 1fr 1fr; }
        .instruments-grid.seven   { grid-template-columns: 1fr 1fr 1fr 1fr; }
        .instruments-grid.eight   { grid-template-columns: 1fr 1fr 1fr 1fr; }
        .instrument-card {
            background: linear-gradient(145deg, #ffffff 0%, #f8fafc 100%); border-radius: 20px; padding: 24px;
            box-shadow: 0 16px 32px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.8);
            border: 1px solid rgba(255,255,255,0.4); transition: all 0.4s ease; position: relative; overflow: hidden;
        }
        .instrument-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #667eea 0%, #764ba2 50%, #f093fb 100%); }
        .instrument-card:hover { transform: translateY(-4px); box-shadow: 0 24px 48px rgba(0,0,0,0.12); }
        .instrument-name { text-align: center; font-size: 1.4em; font-weight: 600; margin-bottom: 20px; color: #333; }
        .instrument-controls { display: flex; justify-content: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .instrument-controls select { min-width: 120px; padding: 12px 16px; font-size: 14px; }
        .instrument-controls .instrument-select { flex: 1; min-width: 160px; }
        .key-scale-row { display: flex; gap: 6px; flex: 1; min-width: 160px; }
        .key-scale-row select { flex: 1; min-width: 70px; padding: 10px 12px; font-size: 13px; }
        .key-select { border-color: rgba(240,101,149,0.3) !important; box-shadow: 0 4px 16px rgba(240,101,149,0.1) !important; }
        .key-select:hover, .key-select:focus { border-color: #f065a6 !important; }
        svg { width: 100%; height: 280px; border-radius: 12px; background: rgba(255,255,255,0.6); display: block; -webkit-transform: translateZ(0); transform: translateZ(0); }
        .footer-note { text-align: center; margin-top: 30px; font-size: 11px; color: #666; line-height: 1.4; }
        @media (max-width: 1200px) { .instruments-grid.triple,.instruments-grid.quad,.instruments-grid.five,.instruments-grid.six,.instruments-grid.seven,.instruments-grid.eight { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 768px) { .instruments-grid { grid-template-columns: 1fr !important; } .controls { flex-direction: column; align-items: center; } .instrument-controls { flex-direction: column; } .container { padding: 20px; } select { font-size: 16px; } svg { height: 240px; } }
        @media (max-width: 480px) { .container { padding: 15px; } .reset-button { position: static; transform: none; display: block; margin: 8px auto 0; } svg { height: 200px; } }
    </style>
</head>
<body>
<div class="container">
    <h1>Multi-Instrument Scale Generator</h1>
    <div class="controls">
        <div class="control-group">
            <label for="keySelect">Key</label>
            <select id="keySelect">
                <option value="C">C</option><option value="C#">C#</option><option value="D">D</option>
                <option value="D#">D#</option><option value="E">E</option><option value="F">F</option>
                <option value="F#">F#</option><option value="G">G</option><option value="G#">G#</option>
                <option value="A">A</option><option value="A#">A#</option><option value="B">B</option>
            </select>
        </div>
        <div class="control-group">
            <label for="scaleSelect">Scale</label>
            <select id="scaleSelect">
                <option value="Major">Major</option><option value="Minor">Minor</option>
                <option value="Pentatonic Major">Pentatonic Major</option><option value="Pentatonic Minor">Pentatonic Minor</option>
                <option value="Blues">Blues</option><option value="Dorian">Dorian</option>
                <option value="Mixolydian">Mixolydian</option>
            </select>
        </div>
        <div class="control-group">
            <label for="instrumentSelect">Instrument</label>
            <select id="instrumentSelect">
                <option value="piano">Piano</option><option value="guitar">Guitar</option>
                <option value="bass">Bass Guitar</option><option value="ukulele">Ukulele</option>
                <option value="mandolin">Mandolin</option><option value="banjo">Banjo</option>
                <option value="violin">Violin</option>
            </select>
        </div>
        <div class="control-group">
            <label for="numInstruments"># of scales</label>
            <select id="numInstruments">
                <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option>
                <option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option>
            </select>
        </div>
    </div>
    <div class="scale-title" id="scaleTitle">
        C Major Scale
        <button class="reset-button" onclick="resetAllInstruments()">Reset Key</button>
    </div>
    <div id="instrumentsContainer" class="instruments-grid single"></div>
    <div class="footer-note">This tool was made to help keep music education fun and free for everyone. Feedback, inquiries, or feature requests are welcome at Mr.Underhill111@Yahoo.com</div>
</div>
<script>
const allNotes = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

// Tunings: index 0 = TOP of diagram (highest string), last index = BOTTOM (lowest string)
// Guitar top-to-bottom: high e, B, G, D, A, low E
const instrumentTunings = {
    piano:    null,
    guitar:   [4, 11, 7, 2, 9, 4],   // e B G D A E
    bass:     [7, 2, 9, 4],           // G D A E
    ukulele:  [9, 4, 0, 7],           // A E C G
    mandolin: [4, 9, 2, 7],           // E A D G
    banjo:    [7, 2, 11, 7, 2],       // g D B G D
    violin:   [4, 9, 2, 7]            // E A D G
};

// Labels matching tuning order (top string first)
const stringLabels = {
    guitar:   ['e','B','G','D','A','E'],
    bass:     ['G','D','A','E'],
    ukulele:  ['A','E','C','G'],
    mandolin: ['E','A','D','G'],
    banjo:    ['g','D','B','G','D'],
    violin:   ['E','A','D','G']
};

const instrumentNames = {
    piano:'Piano', guitar:'Guitar', bass:'Bass Guitar',
    ukulele:'Ukulele', mandolin:'Mandolin', banjo:'Banjo', violin:'Violin'
};

const scaleIntervals = {
    "Major":[0,2,4,5,7,9,11], "Minor":[0,2,3,5,7,8,10],
    "Pentatonic Major":[0,2,4,7,9], "Pentatonic Minor":[0,3,5,7,10],
    "Blues":[0,3,5,6,7,10], "Dorian":[0,2,3,5,7,9,10], "Mixolydian":[0,2,4,5,7,9,10]
};

let currentInstruments=[], instrumentKeys=[], instrumentScales=[], instrumentTypes=[];

function getScaleNotes(key, scale) {
    const root = allNotes.indexOf(key);
    return scaleIntervals[scale].map(i => (root+i)%12);
}

function svgEl(tag, attrs) {
    const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
    for (const [k,v] of Object.entries(attrs)) el.setAttribute(k,v);
    return el;
}

function addGradients(svg) {
    const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
    [['noteGradient','#667eea','#764ba2'],['pianoGradient','#667eea','#764ba2'],['pianoGradientDark','#764ba2','#f093fb']].forEach(([id,c1,c2])=>{
        const g = document.createElementNS('http://www.w3.org/2000/svg','linearGradient');
        g.setAttribute('id',id); g.setAttribute('x1','0%'); g.setAttribute('y1','0%'); g.setAttribute('x2','100%'); g.setAttribute('y2','100%');
        const s1=document.createElementNS('http://www.w3.org/2000/svg','stop'); s1.setAttribute('offset','0%'); s1.setAttribute('stop-color',c1);
        const s2=document.createElementNS('http://www.w3.org/2000/svg','stop'); s2.setAttribute('offset','100%'); s2.setAttribute('stop-color',c2);
        g.appendChild(s1); g.appendChild(s2); defs.appendChild(g);
    });
    svg.appendChild(defs);
}

function drawPiano(svg, scaleNotes) {
    svg.innerHTML='';
    svg.setAttribute('viewBox','0 0 1000 350'); svg.setAttribute('width','100%'); svg.setAttribute('height','280'); svg.setAttribute('preserveAspectRatio','xMidYMid meet');
    addGradients(svg);
    const octaves=3, wkw=1000/(octaves*7), bkw=wkw*0.65, wkh=220, bkh=140;
    const kp=[0,1,0,1,0,0,1,0,1,0,1,0];
    let wi=0;
    for(let o=0;o<octaves;o++) for(let n=0;n<12;n++) if(kp[n]===0){
        const x=wi*wkw, ins=scaleNotes.includes(n);
        const r=svgEl('rect',{x,y:40,width:wkw-2,height:wkh,rx:8});
        r.setAttribute('style', ins ? 'fill:url(#pianoGradient);stroke:#4c63d2;stroke-width:2.5' : 'fill:rgba(255,255,255,0.95);stroke:#333;stroke-width:1.5');
        svg.appendChild(r);
        const t=svgEl('text',{x:x+wkw/2,y:wkh+85,'text-anchor':'middle','dominant-baseline':'middle','font-family':'Inter,sans-serif','font-size':ins?13:11,fill:ins?'#333':'#aaa','font-weight':ins?600:400});
        t.textContent=allNotes[n]; svg.appendChild(t); wi++;
    }
    wi=0;
    for(let o=0;o<octaves;o++) for(let n=0;n<12;n++){
        if(kp[n]===0){wi++;}
        else{
            const x=(wi-0.68)*wkw, ins=scaleNotes.includes(n);
            const r=svgEl('rect',{x,y:40,width:bkw,height:bkh,rx:6});
            r.setAttribute('style', ins ? 'fill:url(#pianoGradientDark);stroke:#764ba2;stroke-width:2.5' : 'fill:#1a1a2e;stroke:#111;stroke-width:1.5');
            svg.appendChild(r);
            const t=svgEl('text',{x:x+bkw/2,y:25,'text-anchor':'middle','dominant-baseline':'middle','font-family':'Inter,sans-serif','font-size':ins?13:11,fill:'#eee','font-weight':ins?600:400});
            t.textContent=allNotes[n]; svg.appendChild(t);
        }
    }
}

function drawStringedInstrument(svg, instrument, scaleNotes) {
    svg.innerHTML='';
    const tuning=instrumentTunings[instrument], labels=stringLabels[instrument], ns=tuning.length;
    const W=900, H=280, nf=12, lm=75, rm=20, tm=28, bm=32;
    const gw=W-lm-rm, gh=H-tm-bm, fs=gw/nf, ss=ns>1?gh/(ns-1):gh;
    svg.setAttribute('viewBox','0 0 '+W+' '+H); svg.setAttribute('width','100%'); svg.setAttribute('height','280'); svg.setAttribute('preserveAspectRatio','xMidYMid meet');
    addGradients(svg);
    const ry=r=>tm+r*ss;
    // strings
    for(let r=0;r<ns;r++){const y=ry(r); svg.appendChild(svgEl('line',{x1:lm,y1:y,x2:lm+gw,y2:y,stroke:'#333','stroke-width':2.5,'stroke-linecap':'round'}));}
    // nut
    svg.appendChild(svgEl('line',{x1:lm,y1:tm-6,x2:lm,y2:tm+(ns-1)*ss+6,stroke:'#333','stroke-width':5,'stroke-linecap':'round'}));
    // frets + numbers
    for(let f=1;f<=nf;f++){
        const x=lm+f*fs;
        svg.appendChild(svgEl('line',{x1:x,y1:tm-6,x2:x,y2:tm+(ns-1)*ss+6,stroke:'#888','stroke-width':1.5,opacity:0.7}));
        const ft=svgEl('text',{x:lm+(f-0.5)*fs,y:tm+(ns-1)*ss+22,'text-anchor':'middle','dominant-baseline':'middle','font-family':'Inter,sans-serif','font-size':12,'font-weight':600,fill:'#666'});
        ft.textContent=f; svg.appendChild(ft);
    }
    // notes: tuning[0]=top string(high), tuning[ns-1]=bottom string(low)
    for(let r=0;r<ns;r++){
        const y=ry(r), open=tuning[r], label=labels[r], ox=lm-24;
        // open string indicator
        if(scaleNotes.includes(open%12)){
            svg.appendChild(svgEl('circle',{cx:ox,cy:y,r:13,fill:'url(#noteGradient)',stroke:'#4c63d2','stroke-width':2}));
            const t=svgEl('text',{x:ox,y,fill:'white','font-weight':700,'font-size':11,'text-anchor':'middle','dominant-baseline':'middle','font-family':'Inter,sans-serif','pointer-events':'none'});
            t.textContent=allNotes[open%12]; svg.appendChild(t);
        } else {
            const t=svgEl('text',{x:ox,y,fill:'#aaa','font-size':13,'font-weight':600,'text-anchor':'middle','dominant-baseline':'middle','font-family':'Inter,sans-serif'});
            t.textContent=label; svg.appendChild(t);
        }
        // fretted notes
        for(let f=1;f<=nf;f++){
            const note=(open+f)%12;
            if(scaleNotes.includes(note)){
                const cx=lm+(f-0.5)*fs;
                svg.appendChild(svgEl('circle',{cx,cy:y,r:13,fill:'url(#noteGradient)',stroke:'#4c63d2','stroke-width':2}));
                const t=svgEl('text',{x:cx,y,fill:'white','font-weight':700,'font-size':11,'text-anchor':'middle','dominant-baseline':'middle','font-family':'Inter,sans-serif','pointer-events':'none'});
                t.textContent=allNotes[note]; svg.appendChild(t);
            }
        }
    }
}

function getInstrumentKey(i)   { return instrumentKeys[i]==='follow'   ? document.getElementById('keySelect').value        : instrumentKeys[i]; }
function getInstrumentScale(i) { return instrumentScales[i]==='follow' ? document.getElementById('scaleSelect').value      : instrumentScales[i]; }
function getInstrumentType(i)  { return instrumentTypes[i]==='follow'  ? document.getElementById('instrumentSelect').value : instrumentTypes[i]; }

function updateSingleDisplay(i) {
    const svg=document.getElementById('svg'+i); if(!svg) return;
    const notes=getScaleNotes(getInstrumentKey(i), getInstrumentScale(i)), inst=getInstrumentType(i);
    if(inst==='piano') drawPiano(svg,notes); else drawStringedInstrument(svg,inst,notes);
    requestAnimationFrame(()=>{svg.style.display='none';svg.offsetHeight;svg.style.display='block';});
}

function updateAllDisplays() { updateTitle(); for(let i=0;i<currentInstruments.length;i++) updateSingleDisplay(i); }

function updateTitle() {
    const el=document.getElementById('scaleTitle'); if(!el) return;
    const ks=new Set(instrumentKeys.map((k,i)=>k==='follow'?document.getElementById('keySelect').value:k));
    const ss=new Set(instrumentScales.map((s,i)=>s==='follow'?document.getElementById('scaleSelect').value:s));
    let txt;
    if(ks.size===1&&ss.size===1) txt=`${[...ks][0]} ${[...ss][0]} Scale`;
    else if(ks.size===1) txt=`${[...ks][0]} - Multiple Scales`;
    else if(ss.size===1) txt=`Multiple Keys - ${[...ss][0]} Scale`;
    else txt='Multiple Keys & Scales';
    el.textContent=txt+' ';
    const btn=document.createElement('button'); btn.className='reset-button'; btn.textContent='Reset Key'; btn.onclick=resetAllInstruments;
    el.appendChild(btn);
}

function updKeyTxt(i)  { const s=document.getElementById('instrumentKey'+i);   if(s){const o=s.querySelector('option[value="follow"]');if(o)o.textContent=getInstrumentKey(i);} }
function updScaleTxt(i){ const s=document.getElementById('instrumentScale'+i); if(s){const o=s.querySelector('option[value="follow"]');if(o)o.textContent=getInstrumentScale(i);} }
function updTypeTxt(i) { const s=document.getElementById('instrumentType'+i);  if(s){const o=s.querySelector('option[value="follow"]');if(o)o.textContent=instrumentNames[getInstrumentType(i)];} }

function updateGlobalKey()        { for(let i=0;i<currentInstruments.length;i++) if(instrumentKeys[i]==='follow'){updKeyTxt(i);updateSingleDisplay(i);} updateTitle(); }
function updateGlobalScale()      { for(let i=0;i<currentInstruments.length;i++) if(instrumentScales[i]==='follow'){updScaleTxt(i);updateSingleDisplay(i);} updateTitle(); }
function updateGlobalInstrument() {
    const name=instrumentNames[document.getElementById('instrumentSelect').value];
    for(let i=0;i<currentInstruments.length;i++) if(instrumentTypes[i]==='follow'){
        updTypeTxt(i);
        const card=document.querySelectorAll('.instrument-card')[i];
        if(card){const n=card.querySelector('.instrument-name');if(n)n.textContent=name;}
        updateSingleDisplay(i);
    }
}

function updateInstrumentKey(i,v)   { instrumentKeys[i]=v;   updKeyTxt(i);   updateSingleDisplay(i); updateTitle(); }
function updateInstrumentScale(i,v) { instrumentScales[i]=v; updScaleTxt(i); updateSingleDisplay(i); updateTitle(); }
function updateInstrumentTypeFromCard(i,v) {
    instrumentTypes[i]=v;
    const resolved=v==='follow'?document.getElementById('instrumentSelect').value:v;
    const card=document.querySelectorAll('.instrument-card')[i];
    if(card){const n=card.querySelector('.instrument-name');if(n)n.textContent=instrumentNames[resolved];}
    updateSingleDisplay(i);
}

function resetAllInstruments() {
    for(let i=0;i<currentInstruments.length;i++){
        instrumentKeys[i]='follow'; instrumentScales[i]='follow'; instrumentTypes[i]='follow';
        const ks=document.getElementById('instrumentKey'+i), ss=document.getElementById('instrumentScale'+i), ts=document.getElementById('instrumentType'+i);
        if(ks)ks.value='follow'; if(ss)ss.value='follow'; if(ts)ts.value='follow';
        updKeyTxt(i); updScaleTxt(i); updTypeTxt(i); updateSingleDisplay(i);
    }
    updateTitle();
}

function mkKeyOpts(gk)   { return ['follow','C','C#','D','D#','E','F','F#','G','G#','A','A#','B'].map((v,i)=>`<option value="${v}">${i===0?gk:v}</option>`).join(''); }
function mkScaleOpts(gs) { return ['follow','Major','Minor','Pentatonic Major','Pentatonic Minor','Blues','Dorian','Mixolydian'].map((v,i)=>`<option value="${v}">${i===0?gs:v}</option>`).join(''); }
function mkTypeOpts(gi)  {
    const list=[['piano','Piano'],['guitar','Guitar'],['bass','Bass Guitar'],['ukulele','Ukulele'],['mandolin','Mandolin'],['banjo','Banjo'],['violin','Violin']];
    return `<option value="follow">${instrumentNames[gi]}</option>`+list.map(([v,l])=>`<option value="${v}">${l}</option>`).join('');
}

function updateInstrumentLayout() {
    const num=parseInt(document.getElementById('numInstruments').value);
    const container=document.getElementById('instrumentsContainer');
    container.className='instruments-grid '+['single','dual','triple','quad','five','six','seven','eight'][num-1];
    container.innerHTML='';
    currentInstruments=[]; instrumentKeys=[]; instrumentScales=[]; instrumentTypes=[];
    const gk=document.getElementById('keySelect').value, gs=document.getElementById('scaleSelect').value, gi=document.getElementById('instrumentSelect').value;
    for(let i=0;i<num;i++){
        currentInstruments.push(gi); instrumentKeys.push('follow'); instrumentScales.push('follow'); instrumentTypes.push('follow');
        const card=document.createElement('div'); card.className='instrument-card';
        card.innerHTML=`
            <div class="instrument-controls">
                <select class="instrument-select" id="instrumentType${i}" onchange="updateInstrumentTypeFromCard(${i},this.value)">${mkTypeOpts(gi)}</select>
                <div class="key-scale-row">
                    <select class="key-select" id="instrumentKey${i}" onchange="updateInstrumentKey(${i},this.value)">${mkKeyOpts(gk)}</select>
                    <select class="key-select" id="instrumentScale${i}" onchange="updateInstrumentScale(${i},this.value)">${mkScaleOpts(gs)}</select>
                </div>
            </div>
            <div class="instrument-name">${instrumentNames[gi]}</div>
            <svg id="svg${i}" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="100%" height="280" preserveAspectRatio="xMidYMid meet"></svg>`;
        container.appendChild(card);
    }
    setTimeout(updateAllDisplays,100);
}

function init() {
    updateInstrumentLayout();
    document.getElementById('keySelect').addEventListener('change',updateGlobalKey);
    document.getElementById('scaleSelect').addEventListener('change',updateGlobalScale);
    document.getElementById('instrumentSelect').addEventListener('change',updateGlobalInstrument);
    document.getElementById('numInstruments').addEventListener('change',updateInstrumentLayout);
}

if(document.readyState==='complete'||document.readyState==='interactive') setTimeout(init,150);
else window.addEventListener('load',()=>setTimeout(init,150));
</script>
</body>
</html>
